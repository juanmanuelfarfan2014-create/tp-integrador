<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - FoodTour</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
    
        <nav>
            <a href="index.html">Volver al Inicio</a>
        </nav>
    </header>

    <main>
        <form action="#" method="POST">
            <h2>FORMULARIO DE CONTACTO</h2>

            <div class="campo">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required minlength="3" placeholder="Tu nombre">
            </div>

            <div class="campo">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="ejemplo@gmail.com">
            </div>

            <div class="campo">
                <label for="tel">Teléfono:</label>
                <input type="tel" id="tel" name="tel" pattern="[0-9]{10}" placeholder="3874123456">
            </div>

            <div class="campo">
                <label for="motivo">Motivo de contacto:</label>
                <select id="motivo" name="motivo" required>
                    <option value="">-- Seleccioná una opción --</option>
                    <option value="reserva">Ofertas</option>
                    <option value="sugerencia">Recomendaciones</option>
                    <option value="reclamo">Reclamo / Problema</option>
                </select>
            </div>

            <div class="campo">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" required minlength="10" rows="5" placeholder="Escribi el mensaje"></textarea>
            </div>

<div class="campo campo-checkbox">
    <input type="checkbox" id="terminos" name="terminos" required>
    <label for="terminos" class="label-inline">Acepto los términos y condiciones</label>
</div>

            <button type="submit">Enviar formulario</button> 
        </form>
    </main>

</body>
</html>
